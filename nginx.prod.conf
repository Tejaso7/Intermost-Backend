user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main buffer=32k flush=5s;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;
    server_tokens off;

    # SSL/TLS Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!3DES;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;
    gzip_min_length 1000;

    # Rate limiting (stricter for production)
    limit_req_zone $binary_remote_addr zone=api_limit:20m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:20m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:20m;

    # Upstream services
    upstream backend {
        least_conn;
        server backend:8000 max_fails=3 fail_timeout=30s;
    }

    upstream frontend {
        least_conn;
        server frontend:3000 max_fails=3 fail_timeout=30s;
    }

    # HTTP to HTTPS redirect
    server {
        listen 80;
        server_name _;
        
        # Allow Let's Encrypt validation
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Backend API Server (HTTPS)
    server {
        listen 443 ssl http2;
        server_name api.intermost.in;

        ssl_certificate /etc/nginx/ssl/intermost.in.crt;
        ssl_certificate_key /etc/nginx/ssl/intermost.in.key;

        # Logging
        access_log /var/log/nginx/api_access.log main buffer=32k flush=5s;
        error_log /var/log/nginx/api_error.log warn;

        # Rate limiting and connection limits
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 100;

        # API endpoints with stricter rate limits
        location ~ ^/api/v1/(auth|register|login)/ {
            limit_req zone=api_limit burst=5 nodelay;
            
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # All other API endpoints
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Connection pooling
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Static files - cache aggressively
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Media files
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }

        # Health check (internal only)
        location /health {
            access_log off;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            
            proxy_pass http://backend;
            proxy_set_header Connection "";
        }
    }

    # Frontend Application Server (HTTPS)
    server {
        listen 443 ssl http2;
        server_name intermost.in www.intermost.in;

        ssl_certificate /etc/nginx/ssl/intermost.in.crt;
        ssl_certificate_key /etc/nginx/ssl/intermost.in.key;

        # Logging
        access_log /var/log/nginx/web_access.log main buffer=32k flush=5s;
        error_log /var/log/nginx/web_error.log warn;

        # Rate limiting
        limit_req zone=general_limit burst=50 nodelay;
        limit_conn conn_limit 200;

        # Root location
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Connection "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffer optimization
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        # Next.js static files - cache aggressively
        location /_next/static {
            proxy_pass http://frontend;
            proxy_cache_valid 200 365d;
            proxy_cache_bypass $http_pragma $http_authorization;
            add_header Cache-Control "public, max-age=31536000, immutable";
            expires 365d;
        }

        # Public assets
        location /public {
            proxy_pass http://frontend;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        # Health check (internal only)
        location /health {
            access_log off;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            
            proxy_pass http://frontend;
        }
    }

    # Redirect www to non-www for API (optional)
    server {
        listen 443 ssl http2;
        server_name www.api.intermost.in;

        ssl_certificate /etc/nginx/ssl/intermost.in.crt;
        ssl_certificate_key /etc/nginx/ssl/intermost.in.key;

        return 301 https://api.intermost.in$request_uri;
    }
}
